name: CI Pipeline - Lint & Build

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Add your env vars here as GitHub Secrets when needed
          # NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          CI: false
